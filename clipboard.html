<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Copy Button</title>
<style>
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    background: #f5f5f5;
    font-family: sans-serif;
  }

  .copy-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 38px;
    height: 38px;
    border-radius: 8px;
    border: 1px solid #ddd;
    background: #fff;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    position: relative;
  }

  .copy-btn:hover { background: #f0f0f0; border-color: #bbb; }
  .copy-btn.copied { background: #f0fdf4; border-color: #86efac; }

  .icon { position: absolute; transition: opacity 0.15s, transform 0.15s; }
  .icon-copy  { opacity: 1; transform: scale(1); }
  .icon-check { opacity: 0; transform: scale(0); }

  .copied .icon-copy  { opacity: 0; transform: scale(0); }
  .copied .icon-check { opacity: 1; transform: scale(1); }

  svg { display: block; }
</style>
</head>
<body>

<button class="copy-btn" id="copyBtn" title="Copy to clipboard" onclick="copyText()">
  <svg class="icon icon-copy" width="16" height="16" viewBox="0 0 24 24" fill="none"
    stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="9" y="9" width="13" height="13" rx="2"/>
    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
  </svg>
  <svg class="icon icon-check" width="16" height="16" viewBox="0 0 24 24" fill="none"
    stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="20 6 9 17 4 12"/>
  </svg>
</button>

<script>
  let timeout;

  function copyText() {
    navigator.clipboard.writeText("Hello, world!").then(() => {
      const btn = document.getElementById("copyBtn");
      btn.classList.add("copied");
      clearTimeout(timeout);
      timeout = setTimeout(() => btn.classList.remove("copied"), 500);
    });
  }
</script>

</body>
</html>
