<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trash morph — delete confirm</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #f5f5f3;
      --color-surface: #ffffff;
      --color-border: rgba(0,0,0,0.12);
      --color-border-hover: rgba(0,0,0,0.25);
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #6b6b68;
      --color-text-danger: #a32d2d;
      --color-text-success: #3b6d11;
      --color-bg-danger: #fcebeb;
      --color-bg-success: #eaf3de;
      --color-border-danger: #f09595;
      --color-border-success: #97c459;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg: #1c1c1a;
        --color-surface: #2a2a27;
        --color-border: rgba(255,255,255,0.12);
        --color-border-hover: rgba(255,255,255,0.28);
        --color-text-primary: #f0efe8;
        --color-text-secondary: #9b9a93;
        --color-text-danger: #f09595;
        --color-text-success: #97c459;
        --color-bg-danger: #501313;
        --color-bg-success: #173404;
        --color-border-danger: #a32d2d;
        --color-border-success: #3b6d11;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--color-bg);
      color: var(--color-text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stage {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      background: var(--color-surface);
      border-radius: 16px;
      border: 0.5px solid var(--color-border);
    }

    .delete-group {
      display: flex;
      align-items: center;
      position: relative;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: none;
      border-radius: 50%;
      transition: background 0.15s, transform 0.1s, opacity 0.2s;
      flex-shrink: 0;
    }
    .btn:active { transform: scale(0.92); }

    .trash-btn {
      width: 44px; height: 44px;
      background: var(--color-surface);
      border: 0.5px solid var(--color-border-hover);
    }
    .trash-btn:hover { background: var(--color-bg-danger); }
    .trash-btn:hover .trash-icon { stroke: var(--color-text-danger); }

    .confirm-btn {
      width: 40px; height: 40px;
      background: var(--color-bg-success);
      border: 0.5px solid var(--color-border-success);
    }
    .confirm-btn:hover { opacity: 0.8; }

    .cancel-btn {
      width: 40px; height: 40px;
      background: var(--color-surface);
      border: 0.5px solid var(--color-border);
    }
    .cancel-btn:hover { background: var(--color-bg); }

    .action-btns {
      display: flex;
      align-items: center;
      gap: 8px;
      overflow: hidden;
      max-width: 0;
      opacity: 0;
      transition: max-width 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.25s ease, margin-left 0.35s cubic-bezier(0.4,0,0.2,1);
      margin-left: 0;
    }
    .action-btns.open {
      max-width: 120px;
      opacity: 1;
      margin-left: 10px;
    }

    .label-text {
      font-size: 13px;
      color: var(--color-text-secondary);
      margin-left: 14px;
      min-width: 100px;
      transition: opacity 0.2s, color 0.2s;
    }

    .trash-icon {
      stroke: var(--color-text-secondary);
      transition: stroke 0.15s;
    }

    .flash-success { animation: flashGreen 0.5s ease forwards; }
    .flash-cancel  { animation: flashGray  0.4s ease forwards; }

    @keyframes flashGreen {
      0%   { background: var(--color-bg-success); }
      60%  { background: var(--color-bg-success); }
      100% { background: var(--color-surface); }
    }
    @keyframes flashGray {
      0%   { background: var(--color-bg); }
      100% { background: var(--color-surface); }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="delete-group">
      <button class="btn trash-btn" id="trashBtn" aria-label="Delete">
        <svg class="trash-icon" width="18" height="18" viewBox="0 0 18 18" fill="none"
             stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3,5 15,5"/>
          <path d="M6 5V3.5A0.5 0.5 0 0 1 6.5 3h5a0.5 0.5 0 0 1 0.5 0.5V5"/>
          <rect x="4" y="5" width="10" height="10" rx="1.5"/>
          <line x1="7" y1="8" x2="7" y2="12"/>
          <line x1="11" y1="8" x2="11" y2="12"/>
        </svg>
      </button>

      <div class="action-btns" id="actionBtns">
        <button class="btn confirm-btn" id="confirmBtn" aria-label="Confirm delete">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"
               stroke="var(--color-text-success)" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <polyline points="2.5,8 6.5,12 13.5,4"/>
          </svg>
        </button>
        <button class="btn cancel-btn" id="cancelBtn" aria-label="Cancel">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"
               stroke="var(--color-text-secondary)" stroke-width="1.5" stroke-linecap="round">
            <line x1="1" y1="1" x2="11" y2="11"/>
            <line x1="11" y1="1" x2="1" y2="11"/>
          </svg>
        </button>
      </div>

      <span class="label-text" id="labelText">delete item</span>
    </div>
  </div>

  <script>
    const trash      = document.getElementById('trashBtn');
    const actions    = document.getElementById('actionBtns');
    const confirmBtn = document.getElementById('confirmBtn');
    const cancelBtn  = document.getElementById('cancelBtn');
    const label      = document.getElementById('labelText');

    let open = false;

    function openConfirm() {
      open = true;
      actions.classList.add('open');
      trash.style.borderColor = 'var(--color-border-danger)';
      label.textContent = 'are you sure?';
      label.style.color = 'var(--color-text-danger)';
    }

    function closeConfirm() {
      open = false;
      actions.classList.remove('open');
      trash.style.borderColor = '';
      label.textContent = 'delete item';
      label.style.color = 'var(--color-text-secondary)';
    }

    trash.addEventListener('click', () => { if (!open) openConfirm(); });

    confirmBtn.addEventListener('click', () => {
      trash.classList.add('flash-success');
      label.textContent = 'deleted!';
      label.style.color = 'var(--color-text-success)';
      actions.classList.remove('open');
      open = false;
      trash.style.borderColor = '';
      setTimeout(() => {
        trash.classList.remove('flash-success');
        label.textContent = 'delete item';
        label.style.color = 'var(--color-text-secondary)';
      }, 1400);
    });

    cancelBtn.addEventListener('click', () => {
      trash.classList.add('flash-cancel');
      setTimeout(() => trash.classList.remove('flash-cancel'), 400);
      closeConfirm();
    });
  </script>
</body>
</html>
